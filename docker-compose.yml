services:
  mysql:
    image: mysql:8.0
    container_name: wfh_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wfh_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - wfh_network

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: unless-stopped
    env_file:
      - ./backend/api-gateway/.env
    ports:
      - "3000:3000"
    volumes:
      - api_gateway_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      auth-service:
        condition: service_started
      employee-service:
        condition: service_started
      attendance-service:
        condition: service_started
    networks:
      - wfh_network

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: unless-stopped
    env_file:
      - ./backend/auth-service/.env
    ports:
      - "3001:3001"
    volumes:
      - auth_service_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wfh_network

  employee-service:
    build:
      context: ./backend/employee-service
      dockerfile: Dockerfile
    container_name: employee_service
    restart: unless-stopped
    env_file:
      - ./backend/employee-service/.env
    ports:
      - "3002:3002"
    volumes:
      - employee_service_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wfh_network

  attendance-service:
    build:
      context: ./backend/attendance-service
      dockerfile: Dockerfile
    container_name: attendance_service
    restart: unless-stopped
    env_file:
      - ./backend/attendance-service/.env
    ports:
      - "3003:3003"
    volumes:
      - attendance_service_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wfh_network

volumes:
  mysql_data:
  api_gateway_node_modules:
  auth_service_node_modules:
  employee_service_node_modules:
  attendance_service_node_modules:

networks:
  wfh_network:
    driver: bridge